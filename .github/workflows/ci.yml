name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Security audit (production deps)
        run: pnpm audit --prod

      # Quality gates
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test with coverage
        run: pnpm -r test:coverage
      - name: Build
        run: pnpm -r build

      # Package correctness (per-package)
      - name: Publint
        run: pnpm -r exec publint
      - name: Are the types wrong?
        run: |
          cd packages/core && pnpm attw --pack --ignore-rules no-resolution unexpected-module-syntax && cd ../..
          cd packages/nuxt && pnpm attw --pack --ignore-rules no-resolution unexpected-module-syntax && cd ../..
          cd packages/fastify && pnpm attw --pack --ignore-rules no-resolution unexpected-module-syntax && cd ../..
      - name: Dead code check
        run: pnpm knip
      - name: Smoke test
        run: pnpm test:smoke
      - name: Bundle size check
        run: pnpm test:bundle-size
